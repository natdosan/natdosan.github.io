<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/gallery.css' | relative_url }}">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="topnav">
    <a class="brand" href="https://natdosan.github.io">home</a>
    <a class="vlog" href="https://www.youtube.com/@swagmasternat4" target="_blank">vlog</a>
  </nav>
  
  <main>
    {{ content }}
  </main>
</body>
</html>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const response = await fetch('/assets/gallery.json');
  const groups = await response.json();

  const params = new URLSearchParams(window.location.search);
  const page = Math.max(1, Math.min(parseInt(params.get('page')) || 1, groups.length));
  const group = groups[page - 1];

  const container = document.querySelector('.gallery');
  const nav = document.querySelector('.pagination');

  // Layout class driven by explicit declaration, not inference
  container.classList.add(group.layout === '2x2' ? 'two-by-two' : 'three-by-two');

  group.images.forEach(img => {
    const figure = document.createElement('figure');
    const image = document.createElement('img');
    const caption = document.createElement('figcaption');

    image.src = img.src;
    image.alt = img.caption;
    image.loading = 'lazy';
    image.decoding = 'async';
    caption.textContent = img.caption;

    figure.appendChild(image);
    figure.appendChild(caption);
    container.appendChild(figure);
  });

  // Pagination
  if (page > 1) {
    const prev = document.createElement('a');
    prev.href = `?page=${page - 1}`;
    prev.textContent = '← Previous';
    nav.appendChild(prev);
  }

  if (page < groups.length) {
    const next = document.createElement('a');
    next.href = `?page=${page + 1}`;
    next.textContent = 'Next →';
    nav.appendChild(next);
  }
});
</script>
